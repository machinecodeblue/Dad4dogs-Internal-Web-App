<div class="share-sheet-overlay" id="share-sheet" role="dialog" aria-modal="true" aria-labelledby="share-sheet-title" hidden>
    <div class="share-sheet">
        <h3 id="share-sheet-title">Share moment</h3>
        <div class="share-sheet-actions">
            <button type="button" id="share-copy-link">Copy link</button>
            <a href="#" id="share-gmail" target="_blank" rel="noopener">Share with Gmail</a>
            <a href="#" id="share-whatsapp" target="_blank" rel="noopener">Share with WhatsApp</a>
            <a href="#" id="share-facebook" target="_blank" rel="noopener">Share on Facebook</a>

            <button type="button" class="share-sheet-cancel" id="share-sheet-close">Cancel</button>
        </div>
    </div>
</div>
